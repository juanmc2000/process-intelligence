services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # API URL used by the browser — must be reachable from the host
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-http://localhost:8010}"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - api
    restart: unless-stopped
    logging:
      driver: json-file

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    ports:
      - "${API_PORT:-8010}:8000"
    env_file: .env
    depends_on:
      - postgres
      - minio
      - temporal
    restart: unless-stopped
    logging:
      driver: json-file

  parser-worker:
    build:
      context: .
      dockerfile: services/workers/Dockerfile
    command: python -m services.workers.parser
    env_file: .env
    depends_on:
      - postgres
      - minio
      - temporal
    restart: unless-stopped
    logging:
      driver: json-file

  postgres:
    image: postgres:16
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    env_file: .env
    ports:
      - "${POSTGRES_PORT:-5442}:5432"
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    env_file: .env
    ports:
      - "${MINIO_API_PORT:-9010}:9000"
      - "${MINIO_CONSOLE_PORT:-9011}:9001"
    restart: unless-stopped

  minio-bootstrap:
    image: minio/mc:latest
    depends_on:
      - minio
    env_file: .env
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD; do
        echo 'Waiting for MinIO...';
        sleep 3;
      done;
      mc mb --ignore-existing local/$$MINIO_DEFAULT_BUCKET;
      echo 'MinIO bootstrap complete'
      "
    restart: on-failure

  temporal:
    image: temporalio/auto-setup:latest
    depends_on:
      - postgres
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PWD=${POSTGRES_PASSWORD}
      - POSTGRES_SEEDS=postgres
    ports:
      - "${TEMPORAL_PORT:-7233}:7233"
    restart: unless-stopped

  temporal-ui:
    image: temporalio/ui:latest
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:${TEMPORAL_UI_PORT:-8088}
    ports:
      - "${TEMPORAL_UI_PORT:-8088}:8080"
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:

networks:
  default:
    name: process-intelligence
    driver: bridge
